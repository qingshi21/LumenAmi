<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LumenAmi 桌宠</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Cubism Core for Live2D -->
    <script src="./live2d/live2dcubismcore.min.js"></script>
</head>
<body>
    <!-- 拖拽区域 -->
    <div class="drag-area top"></div>
    <div class="drag-area left"></div>
    <div class="drag-area right"></div>
    
    <div class="close-btn" id="closeBtn">✕</div>

    <!-- Live2D 渲染容器 -->
    <div id="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="menu-item" id="menuBack">📋 宠物列表</div>
        <div class="menu-item" id="menuChat">💬 聊天</div>
        <div class="menu-item menu-danger" id="menuQuit">✕ 关闭桌宠</div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
